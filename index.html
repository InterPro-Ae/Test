<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HAIKA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
        }

        img {
            max-width: 220px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 28px;
            border: 1px solid #0077cc;
            color: #0077cc;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background-color: #0077cc;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="LOGO.png" alt="HAIKA Logo">

        <h1>HAIKA</h1>
        <p>Hλεκτρονική Διακυβέρνηση Κοινωνικής Ασφάλισης</p>

        <!-- Anchor element for file download -->
        <a href="LOGO.png" download class="download-btn">
            Download File
        </a>
    </div>

</body>
</html>
